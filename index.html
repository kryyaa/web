<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kryyaa</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #09090b;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden
        }

        .ticker-wrap {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #09090b;
            border-bottom: 1px solid #1e1e1e;
            padding: 0.55rem 0;
            overflow: hidden;
            z-index: 100;
        }

        .ticker {
            display: flex;
            white-space: nowrap;
            width: max-content;
            animation: ticker 28s linear infinite;
        }

        .ticker span {
            font-family: 'Courier New', monospace;
            font-size: 0.72rem;
            color: #555;
            text-transform: lowercase;
            letter-spacing: 0.08em;
            padding-right: 3rem;
        }

        .ticker span a {
            color: #888;
            text-decoration: none;
        }

        .ticker span a:hover {
            color: #ccc;
        }

        .sep {
            margin: 0 1rem;
            color: #333;
        }

        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .scene {
            perspective: 1200px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 2rem;
        }

        .card {
            transform-style: preserve-3d;
            transition: transform 0.12s ease-out;
            will-change: transform;
        }

        .card img {
            max-width: 90vw;
            max-height: 85vh;
            width: auto;
            height: auto;
            display: block;
            user-select: none;
            pointer-events: none;
        }

        .cursor {
            position: fixed;
            width: 6px;
            height: 6px;
            background: #fff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 999;
            transform: translate(-50%, -50%);
            mix-blend-mode: difference;
        }
    </style>
</head>
<body>

    <div class="cursor" id="cursor"></div>

    <div class="ticker-wrap">
        <div class="ticker" id="ticker">
            <span>репаки от kryyaa <span class="sep">✦</span> <a href="https://t.me/kryyaasoft">телеграм канал</a> <span class="sep">✦</span> приватная группа с туториалами — 400 руб навсегда <span class="sep">✦</span> <a href="https://t.me/kryyaa">написать в личку</a> <span class="sep">✦</span> крякаем игры <span class="sep">✦</span></span><span>репаки от kryyaa <span class="sep">✦</span> <a href="https://t.me/kryyaasoft">телеграм канал</a> <span class="sep">✦</span> приватная группа с туториалами — 400 руб навсегда <span class="sep">✦</span> <a href="https://t.me/kryyaa">написать в личку</a> <span class="sep">✦</span> крякаем игры <span class="sep">✦</span></span>
        </div>
    </div>

    <div class="scene">
        <div class="card" id="card">
            <img src="ascii-art-text.png" alt="kryyaa">
        </div>
    </div>

    <script>
        const card = document.getElementById('card');
        const cursor = document.getElementById('cursor');

        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';

            const rect = card.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            const dx = e.clientX - centerX;
            const dy = e.clientY - centerY;

            const tiltX = -(dy / window.innerHeight) * 10;
            const tiltY = (dx / window.innerWidth) * 10;

            card.style.transform = `rotateX(${tiltX}deg) rotateY(${tiltY}deg)`;
        });
    </script>
</body>
</html>
